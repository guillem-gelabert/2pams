<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2pa.ms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 1.75rem;
      color: #111;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
      color: #111;
    }

    input[type="text"]:focus {
      border-color: #555;
    }

    input[type="text"].error {
      border-color: #e53e3e;
    }

    .error-msg {
      font-size: 0.8rem;
      color: #e53e3e;
      text-align: left;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    button {
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>2pa.ms</h1>
    <form id="form">
      <input id="url-input" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false">
      <span id="error-msg" class="error-msg">Please enter a valid URL starting with http:// or https://</span>
      <button type="submit">Fetch</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('url-input');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = input.value.trim();

      if (!value.startsWith('http://') && !value.startsWith('https://')) {
        input.classList.add('error');
        errorMsg.classList.add('visible');
        return;
      }

      input.classList.remove('error');
      errorMsg.classList.remove('visible');
      window.location.href = window.location.origin + '/' + value;
    });

    input.addEventListener('input', function () {
      input.classList.remove('error');
      errorMsg.classList.remove('visible');
    });
  </script>
</body>
</html>
